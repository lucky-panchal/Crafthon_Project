[mypy]
python_version = 3.11
# Point mypy at the interpreter that has pydantic installed
python_executable = C:\Users\Panchal Tanya\AppData\Local\Programs\Python\Python311\python.exe

# Strict-ish — catches real bugs without being noisy
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = False

# pydantic v2 ships py.typed — no stubs package needed
[mypy-pydantic.*]
ignore_missing_imports = False
